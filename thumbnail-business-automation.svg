<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Stop Losing Leads thumbnail concept</title>
  <desc id="desc">Bold business video thumbnail with a lead notification interface and upward conversion arrow.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061523" />
      <stop offset="0.55" stop-color="#0a2840" />
      <stop offset="1" stop-color="#104055" />
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#50f2be" />
      <stop offset="1" stop-color="#16bfa2" />
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffde82" />
      <stop offset="1" stop-color="#f4ad37" />
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#020a10" flood-opacity="0.5" />
    </filter>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="18" />
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#background)" />
  <circle cx="1110" cy="70" r="230" fill="#25d0b1" opacity="0.08" />
  <circle cx="1260" cy="670" r="300" fill="#f3b84b" opacity="0.055" />
  <path d="M0 638 C250 580 360 720 650 648 S1040 550 1280 610 V720 H0Z" fill="#03101a" opacity="0.58" />

  <g transform="translate(74 72)">
    <rect width="274" height="48" rx="24" fill="#ffffff" opacity="0.095" />
    <circle cx="28" cy="24" r="7" fill="#50f2be" />
    <text x="48" y="31" fill="#c9e7e3" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" letter-spacing="1.6">SERVICE BUSINESS</text>
  </g>

  <g transform="translate(72 184)">
    <text x="0" y="0" fill="#f7fffd" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="104" font-weight="900" letter-spacing="-5">STOP</text>
    <text x="0" y="100" fill="#f7fffd" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="104" font-weight="900" letter-spacing="-5">LOSING</text>
    <text x="0" y="210" fill="url(#green)" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="122" font-weight="900" letter-spacing="-7">LEADS</text>
    <rect x="0" y="245" width="455" height="70" rx="18" fill="url(#gold)" />
    <text x="28" y="292" fill="#142230" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="900" letter-spacing="1.2">THE 30-SECOND FIX</text>
  </g>

  <g transform="translate(708 92) rotate(2 228 270)" filter="url(#shadow)">
    <rect width="456" height="548" rx="45" fill="#0a1825" stroke="#8acdc2" stroke-opacity="0.32" stroke-width="3" />
    <rect x="20" y="20" width="416" height="508" rx="32" fill="#102b3c" />
    <rect x="166" y="34" width="124" height="12" rx="6" fill="#55717d" />

    <text x="52" y="104" fill="#9dbec4" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" letter-spacing="1.4">LEAD INBOX</text>
    <circle cx="389" cy="96" r="16" fill="#50f2be" opacity="0.18" />
    <circle cx="389" cy="96" r="6" fill="#50f2be" />

    <g transform="translate(44 132)">
      <rect width="368" height="122" rx="24" fill="#f7fffd" />
      <circle cx="48" cy="46" r="24" fill="url(#green)" />
      <path d="M38 47 l8 8 15-18" fill="none" stroke="#052226" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
      <text x="90" y="43" fill="#142230" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="900">NEW QUOTE REQUEST</text>
      <text x="90" y="74" fill="#58707b" font-family="Arial, Helvetica, sans-serif" font-size="18">Replied in 12 seconds</text>
      <rect x="90" y="90" width="182" height="8" rx="4" fill="#d9e7e9" />
    </g>

    <g transform="translate(44 278)">
      <rect width="368" height="84" rx="22" fill="#16394b" stroke="#4e7c88" stroke-opacity="0.4" />
      <circle cx="44" cy="42" r="17" fill="#f3b84b" opacity="0.22" />
      <path d="M44 31 v12 l8 6" fill="none" stroke="#ffd575" stroke-width="4" stroke-linecap="round" />
      <text x="78" y="37" fill="#e9f6f5" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="800">FOLLOW-UP SCHEDULED</text>
      <text x="78" y="61" fill="#8fb2b8" font-family="Arial, Helvetica, sans-serif" font-size="15">Tomorrow · 9:00 AM</text>
    </g>

    <g transform="translate(44 386)">
      <text x="0" y="24" fill="#9dbec4" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">THIS WEEK</text>
      <text x="0" y="82" fill="#f7fffd" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="58" font-weight="900">+42%</text>
      <text x="184" y="80" fill="#50f2be" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="800">FASTER RESPONSE</text>
      <path d="M188 51 C228 56 257 36 292 13" fill="none" stroke="#50f2be" stroke-width="8" stroke-linecap="round" />
      <path d="M280 12 l16 0 -4 16" fill="none" stroke="#50f2be" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
    </g>
  </g>

  <g opacity="0.98">
    <path d="M603 420 C675 372 705 340 747 302" fill="none" stroke="#50f2be" stroke-width="16" stroke-linecap="round" />
    <path d="M727 292 l36 -7 -7 36" fill="none" stroke="#50f2be" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <rect x="74" y="665" width="454" height="1" fill="#ffffff" opacity="0.22" />
  <text x="74" y="692" fill="#8eabb4" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" letter-spacing="1.1">ORIGINAL CONCEPT • AUTONOMOUS AI WORKFLOW</text>
</svg>
